# =============================================================================
# DTrader 6 — WS-Server Service Configuration
# =============================================================================

# Настройки приложения
app:
  name: dtrader-6-ws-server
  env: development         # development | production

# Настройки WebSocket сервера
server:
  host: 0.0.0.0            # слушаем на всех интерфейсах
  port: 1971               # порт подключения клиентов
  ping_interval: 10s       # интервал ping/pong с клиентами

# Настройки Redis
redis:
  host: localhost
  port: 6379
  db: 0
