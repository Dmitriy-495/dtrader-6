# =============================================================================
# DTrader 6 — Bot Service Configuration
# Бот отвечает ТОЛЬКО за сбор сырых данных с биржи
# =============================================================================

# Настройки приложения
app:
  name: dtrader-6-bot
  env: development         # development | production

# Настройки биржи Gate.io
exchange:
  name: gate.io
  ws_url: wss://fx-ws.gateio.ws/v4/ws/usdt          # USDT Perpetual Futures
  ws_testnet_url: wss://fx-ws-testnet.gateio.ws/v4/ws/usdt  # Testnet
  rest_url: https://api.gateio.ws/api/v4
  reconnect_interval: 5s   # пауза перед переподключением при разрыве
  ping_interval: 10s        # интервал ping/pong для поддержания соединения

# Торгуемые пары (USDT Perpetual Futures)
symbols:
  - BTC_USDT
  - ETH_USDT
  - SOL_USDT

# Стакан ордеров
orderbook:
  depth: 20                # максимальная глубина стакана (levels)

# Настройки Redis
redis:
  host: localhost
  port: 6379
  db: 0

# Размеры скользящих окон хранения сырых данных в Redis
storage:
  candles_1m: 200          # последние 200 свечей 1m (~3 часа)
  trades:     1000         # последние 1000 тиков на символ
